# Check external links in all markdown files.
# Runs weekly (Monday 9am UTC) and on manual trigger.
# Does NOT block deployments — runs as a separate job.
name: Check external links

on:
  schedule:
    - cron: "0 9 * * 1"   # Every Monday at 09:00 UTC
  workflow_dispatch:        # Manual trigger from Actions tab

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Check links with lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Check all markdown files in docs/ — skip anchors (fast mode) and
          # ignore known rate-limited or login-required URLs.
          args: >
            --verbose
            --no-progress
            --exclude "localhost"
            --exclude "127.0.0.1"
            --exclude "aka.ms"
            --exclude "adoption.microsoft.com"
            --exclude "m365.cloud.microsoft"
            docs/**/*.md
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
