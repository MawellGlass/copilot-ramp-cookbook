# ── Copilot Ramp Cookbook — MkDocs configuration ────────────────────────────
# Unofficial, community-built. Not affiliated with or endorsed by Microsoft.
#
# Local preview:  mkdocs serve   (then open http://127.0.0.1:8000)
# Build static:   mkdocs build   (outputs to ./site)
# Deploy Pages:   mkdocs gh-deploy   (or use the GitHub Action in .github/workflows)

site_name: Copilot Ramp Cookbook
site_description: >-
  A grassroots ramp through the Microsoft Copilot maturity journey —
  from your first chat to building production agents in Copilot Studio.
  Unofficial and community-built.
site_author: Copilot Ramp Cookbook contributors

# ⚠️ Replace <org-or-user> with your GitHub account when you create the repo.
# These three lines drive the repo link, edit button, and Pages base path.
site_url: https://MawellGlass.github.io/copilot-ramp-cookbook/
repo_url: https://github.com/MawellGlass/copilot-ramp-cookbook
repo_name: copilot-ramp-cookbook
edit_uri: edit/main/docs/

# Markdown source lives in docs/ (walkthroughs, catalog, resources, stage pages).
docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  language: en
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs            # top-level stages as tabs
    - navigation.tabs.sticky
    - navigation.expand          # sub-sections are collapsible dropdowns, expanded by default
    - navigation.top             # back-to-top button
    - navigation.footer          # prev/next links at page bottom
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy          # copy button on the prompt code blocks
    - content.action.edit
  palette:
    # Light mode (default) with a toggle to dark
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - stylesheets/home.css
  - stylesheets/catalog.css
  - stylesheets/mermaid.css
  - stylesheets/nav.css
  - stylesheets/role-path.css
  - stylesheets/cards.css
  - stylesheets/callouts.css

extra_javascript:
  - javascripts/catalog.js
  - javascripts/mermaid-render.js
  - javascripts/nav-expand.js
  - javascripts/role-path.js
  - javascripts/feedback.js
  - javascripts/card-filter.js

hooks:
  - tooling/mkdocs_hooks.py       # regenerates docs/path-catalog.json before each build

plugins:
  - search
  - tags:
      tags_file: tags.md         # auto-populates docs/tags.md with the tag index
  - rss:
      match_path: "walkthroughs/.*"
      use_git: false
      date_from_meta:
        as_creation: updated
      length: 20
  - git-revision-date-localized:
      type: date
      enable_creation_date: false
      fallback_to_build_date: true   # avoid --strict failures for untracked files

markdown_extensions:
  - admonition                   # the > **Next:** / 📚 callouts render as cards
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid          # rendered by javascripts/mermaid-render.js (Material's
          class: mermaid-diagram # built-in mermaid integration renders empty in this setup)
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:              # renders :octicons-*: icon shortcodes (e.g. Next: links)
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MawellGlass/copilot-ramp-cookbook
  generator: false               # drop the "Made with Material for MkDocs" footer line

